<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">bunIn 번인 - 생각만 하던 일을 쓰이는 서비스로</title>
  <desc id="desc">bunIn은 홈페이지와 앱, 예약 결제, 관리자 화면을 필요한 만큼 설계하고 만드는 서비스 개발사입니다.</desc>
  <defs>
    <linearGradient id="page-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11110f"/>
      <stop offset="0.48" stop-color="#181713"/>
      <stop offset="1" stop-color="#11110f"/>
    </linearGradient>
    <linearGradient id="brand-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4e57"/>
      <stop offset="1" stop-color="#ff745f"/>
    </linearGradient>
    <linearGradient id="headline-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4e57"/>
      <stop offset="0.58" stop-color="#ff745f"/>
      <stop offset="1" stop-color="#ffd65a"/>
    </linearGradient>
    <linearGradient id="track-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4e57"/>
      <stop offset="0.38" stop-color="#ffd65a"/>
      <stop offset="0.7" stop-color="#83ff73"/>
      <stop offset="1" stop-color="#7cc8ff"/>
    </linearGradient>
    <radialGradient id="soft-red" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff4e57" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ff4e57" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="soft-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd65a" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffd65a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#f5f0e7" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#page-bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1018" cy="108" r="258" fill="url(#soft-red)" filter="url(#blur-strong)"/>
  <circle cx="932" cy="506" r="258" fill="url(#soft-amber)" filter="url(#blur-strong)"/>
  <circle cx="198" cy="660" r="310" fill="#ff4e57" opacity="0.08" filter="url(#blur-strong)"/>

  <g transform="translate(74 70)">
    <rect width="90" height="90" rx="24" fill="rgba(245,240,231,0.06)" stroke="#ff4e57" stroke-opacity="0.78" stroke-width="2"/>
    <text x="45" y="62" text-anchor="middle" fill="#ff4e57" font-size="51" font-weight="900" font-family="Apple SD Gothic Neo, AppleGothic, Pretendard, Arial, sans-serif">B</text>
    <text x="116" y="37" fill="#f5f0e7" font-size="36" font-weight="900" letter-spacing="-1" font-family="Apple SD Gothic Neo, AppleGothic, Pretendard, Arial, sans-serif">bunIn</text>
    <text x="118" y="72" fill="#b8afa0" font-size="18" font-weight="800" letter-spacing="2.2" font-family="Apple SD Gothic Neo, AppleGothic, Pretendard, Arial, sans-serif">번인 · BURNED-IN</text>
  </g>

  <g transform="translate(74 214)" font-family="Apple SD Gothic Neo, AppleGothic, Pretendard, Arial, sans-serif">
    <text x="0" y="0" fill="#ff4e57" font-size="24" font-weight="900" letter-spacing="1.2">홈페이지 · 앱 · 예약 결제 · 관리자 화면</text>
    <text x="0" y="82" fill="#f5f0e7" font-size="69" font-weight="900" letter-spacing="-4.2">생각만 하던 일을</text>
    <text x="0" y="162" fill="url(#headline-accent)" font-size="69" font-weight="900" letter-spacing="-4.2">쓰이는 서비스로.</text>
    <text x="0" y="220" fill="#b8afa0" font-size="25" font-weight="760" letter-spacing="-0.8">랜딩페이지부터 예약, 결제, 관리자 화면까지</text>
    <text x="0" y="258" fill="#b8afa0" font-size="25" font-weight="760" letter-spacing="-0.8">실제로 쓰이는 서비스로 만듭니다.</text>
  </g>

  <g transform="translate(74 536)" font-family="Apple SD Gothic Neo, AppleGothic, Pretendard, Arial, sans-serif" font-size="19" font-weight="850">
    <rect width="143" height="46" rx="23" fill="rgba(245,240,231,0.045)" stroke="#f5f0e7" stroke-opacity="0.16"/>
    <text x="28" y="30" fill="#f5f0e7">홈페이지 제작</text>
    <rect x="164" width="100" height="46" rx="23" fill="rgba(245,240,231,0.045)" stroke="#f5f0e7" stroke-opacity="0.16"/>
    <text x="192" y="30" fill="#f5f0e7">앱 제작</text>
    <rect x="285" width="118" height="46" rx="23" fill="rgba(245,240,231,0.045)" stroke="#ff4e57" stroke-opacity="0.52"/>
    <text x="315" y="30" fill="#f5f0e7">예약 결제</text>
    <rect x="424" width="139" height="46" rx="23" fill="rgba(245,240,231,0.045)" stroke="#ffd65a" stroke-opacity="0.46"/>
    <text x="452" y="30" fill="#f5f0e7">관리자 화면</text>
  </g>

  <g transform="translate(760 95)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="348" height="414" rx="48" fill="rgba(245,240,231,0.055)" stroke="#f5f0e7" stroke-opacity="0.14"/>
    <circle cx="174" cy="202" r="132" fill="none" stroke="#f5f0e7" stroke-opacity="0.09" stroke-width="34"/>
    <circle cx="174" cy="202" r="105" fill="none" stroke="#ff4e57" stroke-opacity="0.45" stroke-width="18" stroke-dasharray="150 34 56 28"/>
    <circle cx="174" cy="202" r="72" fill="none" stroke="#ffd65a" stroke-opacity="0.42" stroke-width="12" stroke-dasharray="80 30 42 24"/>
    <circle cx="174" cy="202" r="34" fill="url(#brand-fill)" opacity="0.96"/>
    <path d="M78 288C118 224 151 268 194 202C231 144 254 156 294 92" fill="none" stroke="#11110f" stroke-opacity="0.72" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78 288C118 224 151 268 194 202C231 144 254 156 294 92" fill="none" stroke="url(#track-accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="78" cy="288" r="13" fill="#ff4e57"/>
    <circle cx="194" cy="202" r="13" fill="#ffd65a"/>
    <circle cx="294" cy="92" r="13" fill="#83ff73"/>
    <g font-family="Apple SD Gothic Neo, AppleGothic, Pretendard, Arial, sans-serif" font-size="18" font-weight="900">
      <text x="58" y="342" fill="#b8afa0">방문</text>
      <text x="157" y="151" fill="#b8afa0">예약</text>
      <text x="265" y="62" fill="#b8afa0">문의</text>
    </g>
  </g>

  <path d="M0 626H1200" stroke="url(#track-accent)" stroke-width="8" opacity="0.88"/>
</svg>
