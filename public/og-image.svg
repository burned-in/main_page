<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">bunIn - Full-stack, App, Cloud Native Engineering</title>
  <desc id="desc">bunIn builds web apps, mobile apps, backend systems, and cloud native operations.</desc>
  <defs>
